<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Data Scraper - The Skills Mirage</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .scraper-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .terminal-card {
            background: #000;
            border: 1px solid var(--border-dark);
            border-radius: var(--radius);
            font-family: monospace;
            padding: 16px;
            height: 60vh;
            overflow-y: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-dark);
            padding-bottom: 10px;
            margin-bottom: 10px;
            color: var(--text-3);
            font-size: 13px;
        }

        .terminal-header span.pulse {
            color: var(--green);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        #terminal-output {
            flex: 1;
            overflow-y: auto;
            color: var(--text-2);
            font-size: 13px;
            line-height: 1.6;
        }

        .log-line {
            margin-bottom: 4px;
        }

        .log-source {
            color: var(--accent);
        }

        .log-info {
            color: var(--text);
        }

        .log-success {
            color: var(--green);
        }

        .log-warn {
            color: var(--red);
        }

        .stats-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .stat-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            margin: 8px 0;
            font-variant-numeric: tabular-nums;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .chart-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            flex: 1;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container header-inner">
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 24L12 8L20 24" stroke="var(--accent)" stroke-width="3.5" stroke-linecap="square" />
                    <path d="M12 24L20 8L28 24" stroke="var(--accent)" stroke-width="3.5" stroke-linecap="square"
                        opacity="0.3" />
                </svg>
                <span style="margin-left:8px; font-weight:700; font-size:14px; letter-spacing:1px;">THE SKILLS
                    MIRAGE</span>
            </div>
            <div class="header-right">
                <a href="index.html" class="nav-link" style="margin-right:15px;">&larr; Back to Dashboard</a>
                <span class="live-chip">
                    <span class="live-dot" style="background:var(--green);"></span>
                    Scraping Active
                </span>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="scraper-container">
            <div class="terminal-card">
                <div class="terminal-header">
                    <span>LIVE SCRAPER LOGS</span>
                    <span class="pulse">● CONNECTED TO CLUSTER</span>
                </div>
                <div id="terminal-output">
                    <!-- Logs injected via JS -->
                </div>
            </div>

            <div class="stats-panel">
                <div class="stat-box">
                    <div class="stat-label">Records Processed</div>
                    <div class="stat-value" id="count-records">4,092</div>
                    <div class="stat-label" style="color:var(--green)">+<span id="speed-records">12</span> / sec</div>
                </div>

                <div class="stat-box">
                    <div class="stat-label">AI Risk Updates</div>
                    <div class="stat-value" id="count-risk">943</div>
                    <div class="stat-label" style="color:var(--accent)">Llama 3 Active</div>
                </div>

                <div class="chart-box">
                    <div class="stat-label" style="text-align:left; margin-bottom:10px;">Scraping Throughput</div>
                    <canvas id="throughputChart" style="max-height: 150px;"></canvas>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Terminal Simulation Logic
        const terminal = document.getElementById("terminal-output");
        const sources = ["LinkedIn", "Naukri", "Indeed", "Glassdoor", "WEF Future Jobs database"];
        const roles = ["Software Engineer", "Data Analyst", "Sales Executive", "Customer Support", "Content Writer", "BPO Executive", "HR Manager", "Tally Accountant", "UI/UX Designer"];
        const skillsPool = ["Python", "AWS", "Figma", "Excel", "Data Entry", "Communication", "React", "Salesforce", "Customer Service", "Prompt Engineering", "SEO", "Copywriting"];

        function r(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        // Random numbers for stats
        let totalRecords = 4092;
        let totalRisks = 943;

        function appendLog() {
            const source = r(sources);
            const role = r(roles);
            const skills = [r(skillsPool), r(skillsPool)].join(", ");
            const isWarn = Math.random() > 0.8;

            const time = new Date().toISOString().substring(11, 19);

            let html = `<div class="log-line">
                <span class="log-info">[${time}]</span> 
                <span class="log-source">[${source}]</span> 
            `;

            const action = Math.random();
            if (action > 0.4) {
                html += `Scraped JD: <strong>${role}</strong> | Found skills: <span class="log-success">${skills}</span></div>`;
                totalRecords += Math.floor(Math.random() * 3) + 1;
            } else if (action > 0.1) {
                const riskLevel = ["HIGH", "CRITICAL", "MODERATE"][Math.floor(Math.random() * 3)];
                const colorClass = riskLevel === "CRITICAL" ? "log-warn" : (riskLevel === "MODERATE" ? "log-info" : "log-source");
                html += `[AI Inference] Assessed <strong>${role}</strong> -> Risk: <span class="${colorClass}">${riskLevel}</span></div>`;
                totalRisks++;
                totalRecords++;
            } else {
                html += `<span class="log-warn">RATE LIMIT DETECTED. Rotating proxy... Success.</span></div>`;
            }

            const div = document.createElement("div");
            div.innerHTML = html;
            terminal.appendChild(div);

            // Keep scroll at bottom
            terminal.scrollTop = terminal.scrollHeight;

            // Keep max 100 lines
            if (terminal.children.length > 50) {
                terminal.removeChild(terminal.firstChild);
            }

            // Update UI
            document.getElementById("count-records").innerText = totalRecords.toLocaleString();
            document.getElementById("count-risk").innerText = totalRisks.toLocaleString();
            document.getElementById("speed-records").innerText = Math.floor(Math.random() * 8) + 5;

            // Schedule next log
            setTimeout(appendLog, Math.random() * 1200 + 100);
        }

        // Start logging
        setTimeout(appendLog, 500);
        setTimeout(appendLog, 1500);

        // Chart setup
        const ctx = document.getElementById('throughputChart').getContext('2d');
        const dataArr = Array(15).fill(0).map(() => Math.floor(Math.random() * 50) + 10);

        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(15).fill(''),
                datasets: [{
                    label: 'Req/s',
                    data: dataArr,
                    borderColor: 'var(--accent)',
                    backgroundColor: 'rgba(102, 155, 188, 0.2)',
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0,
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, tooltip: { enabled: false } },
                scales: {
                    x: { display: false },
                    y: { display: false, min: 0, max: 80 }
                },
                animation: { duration: 0 }
            }
        });

        // Update chart
        setInterval(() => {
            chart.data.datasets[0].data.shift();
            chart.data.datasets[0].data.push(Math.floor(Math.random() * 30) + (parseInt(document.getElementById("speed-records").innerText) * 2));
            chart.update();
        }, 1000);
    </script>
</body>

</html>
